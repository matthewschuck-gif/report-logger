<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Report Logger" />
  <meta name="theme-color" content="#490e6f" />
  <title>Report Logger</title>

  <!-- PWA manifest inline -->
  <script>
    const manifest = {
      name: "Report Logger",
      short_name: "Reports",
      start_url: "./",
      display: "standalone",
      background_color: "#490e6f",
      theme_color: "#490e6f",
      icons: [{
        src: "data:image/svg+xml," + encodeURIComponent(`<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect width='192' height='192' fill='%23490e6f'/><path d='M96 16L176 52V112C176 152 136 182 96 192C56 182 16 152 16 112V52L96 16Z' fill='%23ffe100'/><text x='96' y='130' text-anchor='middle' fill='%23490e6f' font-size='80' font-weight='900' font-family='serif'>M</text></svg>`),
        sizes: "192x192", type: "image/svg+xml"
      }]
    };
    const blob = new Blob([JSON.stringify(manifest)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const link = document.createElement('link');
    link.rel = 'manifest'; link.href = url;
    document.head.appendChild(link);
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --navy: #490e6f;
      --gold: #ffe100;
      --gold2: #ffd000;
      --muted: #8A9BB5;
      --white: #ffffff;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow-x: hidden; }
    body {
      background: var(--navy);
      font-family: 'Source Sans 3', sans-serif;
      color: var(--white);
      min-height: 100vh;
      min-height: -webkit-fill-available;
    }
    input, select, textarea, button { font-family: inherit; }

    .app { display: flex; flex-direction: column; align-items: center; padding: 24px 16px 40px; min-height: 100vh; }
    .inner { width: 100%; max-width: 540px; }

    /* Header */
    .header { text-align: center; margin-bottom: 24px; width: 100%; max-width: 540px; }
    .wordmark { display: inline-flex; align-items: center; gap: 12px; margin-bottom: 10px; }
    .wordmark-text { text-align: left; }
    .wordmark-sub { font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--gold); font-weight: 700; }
    .wordmark-title { font-size: 22px; font-weight: 900; color: var(--white); letter-spacing: -0.02em; font-family: 'Playfair Display', serif; line-height: 1.1; }
    .gold-rule { height: 2px; background: linear-gradient(90deg, transparent, var(--gold), transparent); border-radius: 1px; margin: 0 auto; max-width: 300px; }
    .header-sub { font-size: 12px; color: var(--muted); margin-top: 7px; letter-spacing: 0.05em; }

    /* Inputs */
    .field { margin-bottom: 13px; }
    .field-label { display: block; font-size: 10.5px; font-weight: 700; color: #4A6080; text-transform: uppercase; letter-spacing: 0.09em; margin-bottom: 4px; }
    .field input, .field select, .field textarea {
      width: 100%; padding: 9px 12px;
      border: 1.5px solid #C5CEDB; border-radius: 7px;
      font-size: 13.5px; background: var(--white); color: var(--navy);
      outline: none; transition: border-color .15s;
    }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--gold); }
    .field textarea { resize: vertical; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    /* Card */
    .card { background: var(--white); border-radius: 16px; padding: 24px; box-shadow: 0 24px 64px rgba(0,0,0,.45); color: var(--navy); }
    .gold-bar { height: 3px; background: linear-gradient(90deg, var(--gold), var(--gold2), var(--gold)); border-radius: 2px; margin: 16px 0; }

    /* Tabs */
    .tabs { display: flex; gap: 6px; margin-bottom: 12px; overflow-x: auto; padding-bottom: 4px; }
    .tabs::-webkit-scrollbar { display: none; }
    .tab { flex-shrink: 0; padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 700; cursor: pointer; white-space: nowrap; border: 1.5px solid rgba(255,225,0,0.18); background: rgba(255,225,0,0.08); color: var(--muted); transition: all .15s; }
    .tab.active { border: 2px solid var(--gold); background: var(--gold); color: var(--navy); }
    .tab-add { flex-shrink: 0; padding: 6px 12px; border-radius: 20px; border: 1.5px dashed rgba(255,225,0,0.4); background: transparent; color: var(--muted); font-size: 12px; cursor: pointer; }

    /* Buttons */
    .btn-gold { width: 100%; padding: 14px 0; border-radius: 12px; border: none; background: linear-gradient(135deg, var(--gold), var(--gold2)); color: var(--navy); font-size: 15px; font-weight: 700; cursor: pointer; font-family: 'Playfair Display', serif; letter-spacing: 0.02em; }
    .btn-ghost { width: 100%; padding: 11px 0; border-radius: 12px; border: 1.5px solid rgba(255,225,0,0.25); background: transparent; color: var(--muted); font-size: 13px; cursor: pointer; }
    .btn-ghost-sm { padding: 7px 16px; border-radius: 8px; border: 1px solid var(--gold); background: white; color: var(--navy); font-size: 13px; font-weight: 600; cursor: pointer; }
    .btn-ghost-sm:disabled { border-color: #E2E8F0; color: #CBD5E1; cursor: default; }
    .btn-danger { padding: 3px 10px; border-radius: 6px; border: 1px solid #FECACA; background: #FEF2F2; color: #DC2626; font-size: 12px; cursor: pointer; }
    .btn-remove-img { position: absolute; top: -6px; right: -6px; width: 18px; height: 18px; border-radius: 50%; border: none; background: #C0392B; color: white; font-size: 10px; cursor: pointer; line-height: 18px; padding: 0; }
    .btn-log { flex: 2; padding: 12px 0; border-radius: 10px; border: none; font-size: 15px; font-weight: 700; font-family: 'Playfair Display', serif; cursor: pointer; }
    .btn-log.ready { background: linear-gradient(135deg, var(--gold), var(--gold2)); color: var(--navy); }
    .btn-log.disabled { background: #2A3A50; color: var(--muted); cursor: not-allowed; }
    .btn-back { flex: 1; padding: 12px 0; border-radius: 10px; border: 1.5px solid rgba(255,225,0,0.25); background: transparent; color: var(--muted); font-size: 13px; cursor: pointer; }

    /* Drop zone */
    .dropzone { border: 2px dashed rgba(255,225,0,0.25); border-radius: 16px; text-align: center; cursor: pointer; background: rgba(255,225,0,0.04); margin-bottom: 14px; transition: border-color .2s; }
    .dropzone:active { border-color: var(--gold); }
    .dropzone-empty { padding: 40px 20px; }
    .dropzone-has { padding: 14px; }
    .dropzone-icon { font-size: 38px; margin-bottom: 10px; }
    .dropzone-title { font-size: 15px; font-weight: 700; color: var(--gold); margin-bottom: 4px; font-family: 'Playfair Display', serif; }
    .dropzone-sub { font-size: 12.5px; color: var(--muted); }
    .dropzone-add { font-size: 13px; color: var(--gold); font-weight: 600; }

    /* Thumbnails */
    .thumbs { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
    .thumb { position: relative; }
    .thumb img { width: 72px; height: 56px; object-fit: cover; border-radius: 8px; border: 2px solid var(--gold); display: block; }

    /* Spinner */
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .spin { display: inline-block; animation: spin 1.1s linear infinite; }
    .fade-up { animation: fadeUp .35s ease both; }
    .center-pad { text-align: center; padding: 52px 20px; }
    .spin-icon { font-size: 44px; margin-bottom: 14px; }
    .spin-title { font-size: 16px; font-weight: 700; color: var(--gold); font-family: 'Playfair Display', serif; margin-bottom: 6px; }
    .spin-sub { font-size: 13px; color: var(--muted); }
    .success-green { font-size: 13px; color: #22c55e; }

    /* Done screen */
    .done-pad { text-align: center; padding: 40px 20px; }
    .done-title { font-size: 22px; font-weight: 900; color: var(--gold); font-family: 'Playfair Display', serif; margin-bottom: 8px; }
    .done-sub { font-size: 14px; color: var(--muted); margin-bottom: 6px; }
    .done-link { color: var(--gold); font-size: 13px; display: block; margin-bottom: 24px; text-decoration: underline; }

    /* Error */
    .error-banner { background: #FFF0F0; border: 1.5px solid #F5C6C6; border-radius: 10px; padding: 10px 14px; margin-bottom: 12px; font-size: 13px; color: #8B0000; }
    .error-title { font-size: 16px; font-weight: 700; color: #FCA5A5; font-family: 'Playfair Display', serif; margin-bottom: 8px; }
    .error-body { font-size: 13px; color: var(--muted); margin-bottom: 24px; max-width: 340px; margin-left: auto; margin-right: auto; }

    /* Submit row */
    .submit-info { font-size: 12px; color: var(--muted); text-align: center; margin-bottom: 10px; }
    .submit-info span { color: var(--gold); }
    .submit-row { display: flex; gap: 8px; }

    /* Entry header */
    .entry-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
    .entry-count { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
    .nav-row { display: flex; justify-content: space-between; margin-top: 8px; }

    /* Footer */
    .footer { margin-top: 32px; font-size: 11px; color: rgba(255,225,0,0.25); text-align: center; letter-spacing: 0.1em; text-transform: uppercase; }

    /* Screen visibility */
    .screen { display: none; }
    .screen.active { display: block; }

    /* iOS safe area */
    @supports (padding-bottom: env(safe-area-inset-bottom)) {
      .app { padding-bottom: calc(40px + env(safe-area-inset-bottom)); }
    }
  </style>
</head>

<script>

const SYSTEM_PROMPT = `You are an assistant to a school Assistant Principal logging student incidents. You receive one or more images which may be any combination of:

PHYSICAL INCIDENT REPORT FORMS (most common): A printed school form with these specific fields:

For this form type, map fields as follows:

// ── State ────────────────────────────────────────────────────────────────────
let images = [];
let rows = [];
let activeRow = 0;

const todayStr = () => {

  return `${d.getMonth()+1}/${d.getDate()}/${d.getFullYear()}`;
};

// ── Screen management ────────────────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const el = document.getElementById('screen-' + id);
  if (el) { el.classList.add('active'); el.classList.remove('fade-up'); void el.offsetWidth; el.classList.add('fade-up'); }
  window.scrollTo(0, 0);
}

// ── Image handling ───────────────────────────────────────────────────────────
function compressImage(file, callback) {
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const MAX = 1200;
      let w = img.width, h = img.height;
      if (w > MAX || h > MAX) {
        if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
        else { w = Math.round(w * MAX / h); h = MAX; }
      }
      canvas.width = w;
      canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      const compressed = canvas.toDataURL('image/jpeg', 0.7);
      callback({ preview: compressed, base64: compressed.split(',')[1] });
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function handleFiles(files) {
  Array.from(files).filter(f => f.type.startsWith('image/')).forEach(file => {
    compressImage(file, imgObj => {
      images.push(imgObj);
      renderThumbs();
    });
  });
}

function renderThumbs() {
  const dz = document.getElementById('dropzone');
  const thumbsEl = document.getElementById('thumbs');
  const btnAnalyze = document.getElementById('btn-analyze');
  const countEl = document.getElementById('analyze-count');
  const sEl = document.getElementById('analyze-s');

  thumbsEl.innerHTML = images.map((img, i) => `
    <div class="thumb">
      <img src="${img.preview}" alt="" />
      <button class="btn-remove-img" onclick="removeImage(${i})">✕</button>
    </div>`).join('');

  if (images.length > 0) {
    dz.className = 'dropzone dropzone-has';
    dz.innerHTML = '<div class="dropzone-add">+ Add more images</div>';
    btnAnalyze.style.display = 'block';
    countEl.textContent = images.length;
    sEl.textContent = images.length === 1 ? '' : 's';
  } else {
    dz.className = 'dropzone dropzone-empty';
    dz.innerHTML = `<div class="dropzone-icon">📋</div><div class="dropzone-title">Add Report Images</div><div class="dropzone-sub">Statements · Referrals · Screenshots · One or many</div>`;
    btnAnalyze.style.display = 'none';
  }
}

function removeImage(i) {
  images.splice(i, 1);
  renderThumbs();
}

// Drag and drop
const dz = document.getElementById('dropzone');
dz.addEventListener('dragover', e => e.preventDefault());
dz.addEventListener('drop', e => { e.preventDefault(); handleFiles(e.dataTransfer.files); });

// ── Extract ──────────────────────────────────────────────────────────────────
async function extractAll() {
  showScreen('extracting');
  document.getElementById('extract-msg').textContent = 'Reading images…';
  document.getElementById('extract-sub').textContent = `Analyzing ${images.length} image${images.length > 1 ? 's' : ''} and grouping entries…`;

  const content = [
    ...images.map(img => ({ type: "image", source: { type: "base64", media_type: "image/jpeg", data: img.base64 } })),
    { type: "text", text: `Analyze these ${images.length} image(s) and return the JSON array.` }
  ];

  try {
    const res = await fetch(PROXY_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json", "Authorization": `Bearer ${SUPABASE_ANON}` },
      body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 4000, system: SYSTEM_PROMPT, messages: [{ role: "user", content }] })
    });
    const data = await res.json();
    if (data.error) throw new Error(JSON.stringify(data.error));
    const raw = data.content?.find(b => b.type === "text")?.text || "[]";
    const clean = raw.replace(/```json|```/g, "").trim();
    const parsed = JSON.parse(clean);
    rows = (Array.isArray(parsed) ? parsed : [parsed]).map(e => emptyEntry(e));
    activeRow = 0;
    renderReview();
    showScreen('review');
  } catch(err) {
    rows = images.map(() => emptyEntry());
    if (rows.length === 0) rows = [emptyEntry()];
    activeRow = 0;
    renderReview(true, err.message);
    showScreen('review');
  }
}

function startManual() {
  rows = [emptyEntry()];
  activeRow = 0;
  renderReview();
  showScreen('review');
}

// ── Review ───────────────────────────────────────────────────────────────────
function renderReview(extractFailed, errMsg) {
  const errEl = document.getElementById('review-error');
  if (extractFailed) {
    errEl.textContent = `⚠️ Extraction failed${errMsg ? ': ' + errMsg : ''} — fill in manually. ${rows.length > 1 ? rows.length + ' blank entries created, one per image.' : ''}`;
    errEl.style.display = 'block';
  } else { errEl.style.display = 'none'; }

  renderTabs();
  renderCard();
  updateSubmitBar();
}

function renderTabs() {
  const tabsEl = document.getElementById('tabs');
  tabsEl.innerHTML = rows.map((r, i) => `
    <button class="tab ${i === activeRow ? 'active' : ''}" onclick="switchRow(${i})">
      ${r.student || `Entry ${i+1}`}
    </button>`).join('') + `<button class="tab-add" onclick="addRow()">+ Add</button>`;
}

function renderCard() {
  const r = rows[activeRow] || emptyEntry();
  const card = document.getElementById('review-card');
  card.innerHTML = `
    <div class="entry-header">
      <div class="entry-count">Entry ${activeRow+1} of ${rows.length}</div>
      ${rows.length > 1 ? `<button class="btn-danger" onclick="removeRow(${activeRow})">Remove</button>` : ''}
    </div>
    <div class="gold-bar"></div>

    ${field('Student Name *', 'student', 'text', null, r.student)}
    <div class="grid-2">
      ${field('Date', 'date', 'text', null, r.date)}
      ${field('Type', 'type', 'select', TYPE_OPTIONS, r.type)}
    </div>
    ${field('Description', 'description', 'textarea', null, r.description)}
    <div class="grid-2">
      ${field('Parent Contact', 'parentContact', 'select', CONTACT_OPTIONS, r.parentContact)}
      ${field('Consequence', 'consequenceType', 'select', CONSEQUENCE_OPTIONS, r.consequenceType)}
    </div>
    ${field('Notes', 'notes', 'textarea', null, r.notes)}
    ${field('PowerSchool?', 'powerschool', 'text', null, r.powerschool)}

    ${rows.length > 1 ? `
    <div class="nav-row">
      <button class="btn-ghost-sm" ${activeRow === 0 ? 'disabled' : ''} onclick="switchRow(${activeRow-1})">← Prev</button>
      <button class="btn-ghost-sm" ${activeRow === rows.length-1 ? 'disabled' : ''} onclick="switchRow(${activeRow+1})">Next →</button>
    </div>` : ''}
  `;
}

function field(label, key, type, options, value) {
  const id = `field-${key}`;
  let input;
  if (options) {
    input = `<select class="field input" id="${id}" onchange="updateField('${key}', this.value)">
      <option value="">—</option>
      ${options.map(o => `<option value="${o}" ${value === o ? 'selected' : ''}>${o}</option>`).join('')}
    </select>`;
  } else if (type === 'textarea') {
    input = `<textarea id="${id}" rows="3" onchange="updateField('${key}', this.value)" oninput="updateField('${key}', this.value)">${escHtml(value)}</textarea>`;
  } else {
    input = `<input type="text" id="${id}" value="${escHtml(value)}" oninput="updateField('${key}', this.value)" />`;
  }
  return `<div class="field"><label class="field-label">${label}</label>${input}</div>`;
}

function escHtml(s) { return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function updateField(key, val) {
  rows[activeRow][key] = val;
  // Update tab label if student name changed
  if (key === 'student') { renderTabs(); updateSubmitBar(); }
  else { updateSubmitBar(); }
}

function updateSubmitBar() {
  const valid = rows.filter(r => r.student.trim());
  const infoEl = document.getElementById('submit-info');
  const btnLog = document.getElementById('btn-log');

  let info = `${valid.length} of ${rows.length} entr${rows.length === 1 ? 'y' : 'ies'} ready`;
  if (rows.some(r => !r.student.trim())) info += ` <span>· unnamed will be skipped</span>`;
  infoEl.innerHTML = info;

  if (valid.length > 0) {
    btnLog.className = 'btn-log ready';
    btnLog.textContent = `Log ${valid.length} Row${valid.length !== 1 ? 's' : ''} to Sheet ↑`;
    btnLog.disabled = false;
  } else {
    btnLog.className = 'btn-log disabled';
    btnLog.textContent = 'Log 0 Rows to Sheet ↑';
    btnLog.disabled = true;
  }
}

function switchRow(i) {
  activeRow = i;
  renderTabs();
  renderCard();
}

function addRow() {
  rows.push(emptyEntry());
  activeRow = rows.length - 1;
  renderTabs();
  renderCard();
  updateSubmitBar();
}

function removeRow(i) {
  rows.splice(i, 1);
  if (rows.length === 0) rows.push(emptyEntry());
  activeRow = Math.min(activeRow, rows.length - 1);
  renderTabs();
  renderCard();
  updateSubmitBar();
}

function goBack() {
  showScreen('upload');
}

// ── Submit ───────────────────────────────────────────────────────────────────
async function submitAll() {
  const valid = rows.filter(r => r.student.trim());
  if (!valid.length) return;

  showScreen('submitting');
  document.getElementById('submit-msg').textContent = `Logging ${valid.length} row${valid.length > 1 ? 's' : ''}…`;
  document.getElementById('logged-count').textContent = '';

  try {
    const res = await fetch(APPS_SCRIPT_URL, {
      method: "POST",
      body: JSON.stringify(valid),
      headers: { "Content-Type": "application/json" }
    });
    const data = await res.json();
    if (data.success) {
      const ok = data.count || valid.length;
      document.getElementById('done-msg').textContent = `${ok} row${ok !== 1 ? 's' : ''} logged successfully!`;
      showScreen('done');
    } else {
      throw new Error(data.error || "Unknown error");
    }
  } catch(err) {
    // CORS fallback (fire-and-forget)
    try {
      await fetch(APPS_SCRIPT_URL, {
        method: "POST", mode: "no-cors",
        body: JSON.stringify(valid),
        headers: { "Content-Type": "application/json" }
      });
      document.getElementById('done-msg').textContent = `${valid.length} row${valid.length !== 1 ? 's' : ''} sent! Verify in your sheet.`;
      showScreen('done');
    } catch(e2) {
      document.getElementById('error-body').textContent = `Could not reach the logging service. Make sure you have internet and the Apps Script is deployed.`;
      showScreen('error');
    }
  }
}

// ── Reset ────────────────────────────────────────────────────────────────────
function reset() {
  images = [];
  rows = [];
  activeRow = 0;
  renderThumbs();
  document.getElementById('fileInput').value = '';
  showScreen('upload');
}

document.title = APP_TITLE;
document.querySelector('meta[name="apple-mobile-web-app-title"]').content = APP_TITLE;
</script>
